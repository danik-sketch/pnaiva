spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notebook_db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bazelin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.defer-datasource-initialization=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.data-locations=classpath:data.sql

spring.jpa.properties.hibernate.use_sql_comments=false

logging.level.root=${LOG_ROOT_LEVEL:INFO}
logging.level.dev.notebook.notebook=${LOG_APP_LEVEL:DEBUG}
logging.level.org.springframework=${LOG_SPRING_LEVEL:INFO}
logging.level.org.springframework.web=${LOG_WEB_LEVEL:INFO}
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.hibernate=${LOG_HIBERNATE_LEVEL:WARN}
logging.level.org.hibernate.SQL=${LOG_HIBERNATE_SQL_LEVEL:DEBUG}
logging.level.org.hibernate.orm.jdbc.bind=${LOG_HIBERNATE_BIND_LEVEL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_HIBERNATE_BINDER_LEVEL:INFO}
logging.level.sun.rmi=${LOG_SUN_RMI_LEVEL:WARN}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
